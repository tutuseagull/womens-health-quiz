<script>

let lang = localStorage.getItem('lang') || 'zh';
const handbookItems = [
  { zh: { title: '生理周期与健身', sub: '激素变化、运动与饮食指南' }, en: { title: 'Cycle & Fitness', sub: 'Hormones, training & nutrition' }, url: 'cycle-fitness.html' },
];
function setLang(l) {
  lang = l; localStorage.setItem('lang', l);
  ['nav-lang-zh','nav-lang-en'].forEach(id => { const el = document.getElementById(id); if (el) el.classList.toggle('active', id.endsWith(l)); });
  render();
}
function render() {
  const zh = lang === 'zh';
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set('handbook-title', zh ? '身体说明书' : 'Body Guide');
  set('handbook-disclaimer', zh ? '📌 内容仅供健康科普，不构成医疗建议，如有任何疑虑请咨询专业医生。' : '📌 For educational purposes only. Not medical advice.');
  set('nav-drawer-title', zh ? '了解你的身体' : 'Know Your Body');
  set('nav-col-home', zh ? '主页' : 'Home');
  set('nav-col-quiz-title', zh ? '知识问答' : 'Quiz');
  set('nav-col-handbook-title', zh ? '身体说明书' : 'Body Guide');
  set('nav-lang-label', zh ? '语言' : 'Language');
  set('nav-col-cycle-title', zh ? '生理周期与健身' : 'Cycle & Fitness');
  ['nav-sub-1','nav-sub-2','nav-sub-3','nav-sub-4','nav-sub-5','nav-sub-6','nav-sub-7','nav-sub-8'].forEach((id, i) => {
    const el = document.getElementById(id); if (!el) return;
    const zl = ['生理周期与激素','生理周期与健身','避孕科学','妇科检查与疫苗','乳腺健康','生育、产后与更年期','身体构造与常识辟谣','心理健康、性健康与常识'];
    const en = ['Cycle & Hormones','Cycle & Fitness','Contraception','Gynaecological Screening','Breast Health','Fertility & Menopause','Body Anatomy & Myths','Mental & Sexual Health'];
    el.textContent = zh ? zl[i] : en[i];
  });

  // Nav quiz subtopics
  const zhSubs = ['生理周期与激素','生理周期与健身','避孕科学','妇科检查与疫苗','乳腺健康','生育、产后与更年期','身体构造与常识辟谣','心理健康、性健康与常识'];
  const enSubs = ['Cycle & Hormones','Cycle & Fitness','Contraception','Gynaecological Screening','Breast Health','Fertility & Menopause','Body Anatomy & Myths','Mental & Sexual Health'];
  ['nav-sub-1','nav-sub-2','nav-sub-3','nav-sub-4','nav-sub-5','nav-sub-6','nav-sub-7','nav-sub-8'].forEach((id,i) => {
    const el = document.getElementById(id); if (el) el.textContent = zh ? zhSubs[i] : enSubs[i];
  });
  const cycleEl = document.getElementById('nav-col-cycle-fitness');
  if (cycleEl) cycleEl.textContent = zh ? '生理周期与健身' : 'Cycle & Fitness';
  set('footer-nav-label', zh ? '导航' : 'Navigation');
  set('footer-link-home', zh ? '主页' : 'Home');
  set('footer-link-quiz', zh ? '知识问答' : 'Quiz');
  set('footer-link-handbook', zh ? '身体说明书' : 'Body Guide');
  set('footer-ig-text', zh ? '关注湾区女权脱口秀' : 'Follow Wannv Standup');
  const list = document.getElementById('handbook-list');
  if (list) list.innerHTML = handbookItems.map(item =>
    `<button class="section-card" onclick="window.location.href='${item.url}'">
      <div class="section-card-inner">
        <div class="section-title">${item[lang].title}</div>
        <div class="section-meta">${item[lang].sub}</div>
      </div>
      <span class="section-arrow">→</span>
    </button>`
  ).join('');
}
function updateNavLang() {
  ['nav-lang-zh','nav-lang-en'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', id.endsWith(lang));
  });
}
function openNav() { document.getElementById('nav-drawer').classList.add('open'); document.getElementById('nav-overlay').classList.add('open'); document.body.style.overflow='hidden'; }
function closeNav() { document.getElementById('nav-drawer').classList.remove('open'); document.getElementById('nav-overlay').classList.remove('open'); document.body.style.overflow=''; }
render();

</script>
