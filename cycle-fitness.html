<script>
const days = Array.from({length:29},(_,i)=>i);
const estrogen=[10,10,12,15,20,28,38,50,62,72,80,85,88,100,85,30,25,30,35,40,45,48,45,40,32,25,18,12,10];
const progest=[5,5,5,5,5,5,5,5,5,8,10,8,6,5,8,15,30,50,65,75,80,78,70,60,45,30,15,8,5];
const lh=[5,5,5,5,5,6,7,8,10,12,15,18,20,95,35,10,8,7,6,6,6,6,6,5,5,5,5,5,5];
const fsh=[8,8,10,12,15,18,22,26,28,30,28,24,20,40,20,10,8,7,7,7,8,8,8,7,7,6,6,6,8];
const phaseColors=[
  {from:0,to:5,color:'rgba(232,160,180,0.12)'},
  {from:5,to:13,color:'rgba(143,191,122,0.12)'},
  {from:13,to:16,color:'rgba(232,184,106,0.15)'},
  {from:16,to:25,color:'rgba(168,159,212,0.12)'},
  {from:25,to:28,color:'rgba(133,196,184,0.12)'},
];
const phasePlugin={id:'phases',beforeDraw(chart){const{ctx,chartArea:{left,right,top,bottom}}=chart;const W=right-left;phaseColors.forEach(p=>{const x0=left+(p.from/28)*W,x1=left+(p.to/28)*W;ctx.fillStyle=p.color;ctx.fillRect(x0,top,x1-x0,bottom-top);});}};
new Chart(document.getElementById('hormoneChart'),{type:'line',plugins:[phasePlugin],data:{labels:days,datasets:[{label:'雌激素',data:estrogen,borderColor:'#D4537E',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:0.4},{label:'孕激素',data:progest,borderColor:'#7F77DD',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:0.4},{label:'LH',data:lh,borderColor:'#BA7517',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:0.3},{label:'FSH',data:fsh,hidden:true,borderColor:'#1D9E75',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:0.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{title:c=>`第 ${c[0].label} 天`}}},scales:{x:{ticks:{color:'#A8A49C',font:{size:10},callback:v=>v%7===0?`第${v}天`:null,autoSkip:false,maxRotation:0},grid:{color:'rgba(0,0,0,0.04)'}},y:{min:0,max:110,ticks:{display:false},grid:{color:'rgba(0,0,0,0.04)'}}}}});
</script>

          { icon: '🥜', label: 'Nutrition', text: 'Magnesium + complex carbs; increased appetite is a normal physiological response' },
          { icon: '⚠️', label: 'Note', text: 'Avoid fasted training — progesterone already raises physiological stress, fasting compounds it', tip: true }
        ]
      },
      { name: 'Late Luteal / PMS Phase', days: 'Days 25–28', chips: ['Hormones ↓↓', 'PMS window'],
        rows: [
          { icon: '🧘', label: 'Exercise', text: 'Low-intensity cardio, yoga, stretching' },
          { icon: '🐟', label: 'Nutrition', text: 'Reduce caffeine and salt; supplement omega-3' },
          { icon: '💡', label: 'Tip', text: 'Give yourself space — mood shifts are hormonal, not personal', tip: true }
        ]
      }
    ],
    footer: 'Sources: Stacy Sims research / PMC literature on exercise & menstrual cycle'
  }
};

const phaseColors = [
  { bg: '#FDF0F4', text: '#8B3054', chipBg: 'rgba(232,160,180,0.3)' },
  { bg: '#F0F7EC', text: '#2D5E1E', chipBg: 'rgba(143,191,122,0.3)' },
  { bg: '#FDF6E8', text: '#7A4E0A', chipBg: 'rgba(232,184,106,0.3)' },
  { bg: '#F2F0FA', text: '#3D3470', chipBg: 'rgba(168,159,212,0.3)' },
  { bg: '#EDF7F5', text: '#1D5C52', chipBg: 'rgba(133,196,184,0.3)' },
];

function cfSetLang(l) {
  cfLang.current = l;
  document.querySelectorAll('.cf-lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  cfRender();
}

function cfRender() {
  const t = cfText[cfLang.current];
  const zh = cfLang.current === 'zh';

  document.getElementById('cf-back-btn').textContent = t.backBtn;
  document.getElementById('cf-title').textContent = t.title;
  document.getElementById('cf-subtitle').textContent = t.subtitle;
  document.getElementById('cf-note1').textContent = t.note1;
  document.getElementById('cf-note2').textContent = t.note2;
  document.getElementById('cf-chart-title').textContent = t.chartTitle;
  document.getElementById('cf-legend-e').textContent = t.legend.e;
  document.getElementById('cf-legend-p').textContent = t.legend.p;
  document.getElementById('cf-legend-lh').textContent = t.legend.lh;
  document.getElementById('cf-footer').textContent = t.footer;

  // Re-render phases
  const container = document.getElementById('cf-phases');
  container.innerHTML = t.phases.map((phase, pi) => {
    const c = phaseColors[pi];
    const chips = [{ label: phase.days, first: true }, ...phase.chips.map(ch => ({ label: ch }))];
    const chipsHtml = chips.map(ch =>
      `<span class="chip" style="background:${c.chipBg};color:${c.text}">${ch.label}</span>`
    ).join('');
    const rowsHtml = phase.rows.map(row => `
      <div class="phase-row">
        <span class="phase-row-icon">${row.icon}</span>
        <div>
          <div class="phase-row-label">${row.label}</div>
          <div class="phase-row-text">${row.text}</div>
        </div>
      </div>`).join('');
    return `
      <div class="phase-card">
        <div class="phase-top" style="background:${c.bg}">
          <div class="phase-name" style="color:${c.text}">${phase.name}</div>
          <div class="phase-chips">${chipsHtml}</div>
        </div>
        <div class="phase-bottom">${rowsHtml}</div>
      </div>`;
  }).join('');
}

// Init
cfRender();
</script>
</body>
</html>
