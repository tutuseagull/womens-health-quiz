<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>女性健康问答 · 小抄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #F8F6F2;
  --surface: #FFFFFF;
  --text: #1C1C1A;
  --muted: #6B6860;
  --light: #A8A49C;
  --border: #E4E0D8;
  --accent: #0891B2;
  --accent-light: #E0F4F8;
  --highlight: #FFF3B0;
}

body {
  font-family: 'Instrument Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  padding-bottom: 80px;
}

/* ── STICKY HEADER ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
}

.header-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.header-title {
  font-family: 'IBM Plex Serif', serif;
  font-size: 17px;
  font-weight: 600;
  flex: 1;
}

.q-count {
  font-size: 12px;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  white-space: nowrap;
}

/* Search */
.search-wrap {
  position: relative;
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--light);
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 10px 36px 10px 36px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-clear {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px; height: 20px;
  border-radius: 50%;
  border: none;
  background: var(--light);
  color: white;
  font-size: 11px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
}
.search-clear.visible { display: flex; }

/* ── TOPIC NAV ── */
.topic-nav {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.topic-nav::-webkit-scrollbar { display: none; }
.topic-pill {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.topic-pill:active { transform: scale(0.96); }
.topic-pill.active {
  background: var(--text);
  border-color: var(--text);
  color: white;
}

/* ── SEARCH RESULTS BANNER ── */
.results-banner {
  padding: 10px 16px;
  font-size: 13px;
  color: var(--muted);
  display: none;
}
.results-banner.visible { display: block; }
.results-banner span { color: var(--text); font-weight: 500; }

/* ── CONTENT ── */
.content { padding: 0 16px; }

/* Section heading */
.section-head {
  padding: 24px 0 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title {
  font-family: 'IBM Plex Serif', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}
.section-count {
  font-size: 11px;
  color: var(--light);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 8px;
}

/* Question card */
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: opacity 0.2s;
}
.q-card.hidden { display: none; }

.q-header {
  padding: 14px 16px 10px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
}
.q-num {
  font-size: 11px;
  font-weight: 600;
  color: var(--light);
  padding-top: 2px;
  flex-shrink: 0;
  min-width: 28px;
}
.q-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
  flex: 1;
}
.q-text b { font-weight: 600; }
.q-text mark {
  background: var(--highlight);
  border-radius: 2px;
  padding: 0 1px;
}
.q-chevron {
  font-size: 12px;
  color: var(--light);
  flex-shrink: 0;
  padding-top: 3px;
  transition: transform 0.2s;
}
.q-card.open .q-chevron { transform: rotate(180deg); }

.q-answer {
  display: none;
  padding: 0 16px 14px 38px;
}
.q-card.open .q-answer { display: block; }

.answer-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.answer-text {
  font-size: 14px;
  line-height: 1.55;
  color: var(--text);
  margin-bottom: 10px;
  padding: 10px 12px;
  background: var(--accent-light);
  border-radius: 8px;
  border-left: 3px solid var(--accent);
}
.answer-text b { font-weight: 600; }
.answer-text mark { background: var(--highlight); border-radius: 2px; padding: 0 1px; }

.explanation-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--light);
  margin-bottom: 4px;
}
.explanation-text {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
}
.explanation-text mark { background: var(--highlight); border-radius: 2px; padding: 0 1px; }

/* Type badge */
.type-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--bg);
  color: var(--light);
  border: 1px solid var(--border);
  margin-left: 6px;
  vertical-align: middle;
}

/* No results */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 14px;
  display: none;
}
.no-results.visible { display: block; }
.no-results-icon { font-size: 36px; margin-bottom: 12px; }

/* ── BOTTOM EXPAND ALL ── */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 12px 16px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}
.bottom-btn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.bottom-btn:active { transform: scale(0.97); }
.bottom-btn.primary {
  background: var(--text);
  border-color: var(--text);
  color: white;
}
</style>
</head>

// ── RENDER ──
let currentTopic = 'all';
let searchQuery = '';
let globalQNum = 0;
const allCards = [];

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

function renderAnswerParts(parts, query) {
  return parts.map(p => {
    const h = highlight(p.t, query);
    return p.b ? `<b>${h}</b>` : h;
  }).join('');
}

function buildCard(section, q, num) {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.dataset.section = section.id;
  card.dataset.text = (q.q + ' ' + (q.answer || '') + ' ' + (q.answerParts ? q.answerParts.map(p=>p.t).join('') : '') + ' ' + q.explanation).toLowerCase();

  const isInline = ['排序','填空','配对','判断'].includes(q.type);
  const answerHTML = isInline
    ? `<div class="answer-text">${renderAnswerParts(q.answerParts || [{t: q.answer||''}], '')}</div>`
    : `<div class="answer-text"><b>${highlight(q.answer||'', '')}</b></div>`;

  card.innerHTML = `
    <div class="q-header" onclick="toggleCard(this.parentElement)">
      <div class="q-num">Q${num}</div>
      <div class="q-text">${highlight(q.q, '')} <span class="type-badge">${q.type}</span></div>
      <div class="q-chevron">▼</div>
    </div>
    <div class="q-answer">
      <div class="answer-label">答案</div>
      ${answerHTML}
      <div class="explanation-label">解释</div>
      <div class="explanation-text">${highlight(q.explanation, '')}</div>
    </div>`;

  return card;
}

function renderAll() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  globalQNum = 0;

  DATA.forEach(section => {
    const secEl = document.createElement('div');
    secEl.dataset.sectionBlock = section.id;

    const head = document.createElement('div');
    head.className = 'section-head';
    head.innerHTML = `<div class="section-title">${section.title}</div><div class="section-count">${section.questions.length} 题</div>`;
    secEl.appendChild(head);

    section.questions.forEach(q => {
      globalQNum++;
      const card = buildCard(section, q, globalQNum);
      allCards.push({ card, section, q, num: globalQNum });
      secEl.appendChild(card);
    });

    content.appendChild(secEl);
  });

  document.getElementById('q-count').textContent = `${globalQNum} 题`;
}

function toggleCard(card) {
  card.classList.toggle('open');
}

function onSearch(val) {
  searchQuery = val.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('visible', val.length > 0);

  // Reset topic to all when searching
  if (searchQuery) {
    currentTopic = 'all';
    document.querySelectorAll('.topic-pill').forEach(p => p.classList.remove('active'));
    document.querySelector('[data-topic="all"]').classList.add('active');
  }

  applyFilters();
}

function clearSearch() {
  document.getElementById('search').value = '';
  onSearch('');
}

function setTopic(id) {
  currentTopic = id;
  document.querySelectorAll('.topic-pill').forEach(p => p.classList.remove('active'));
  document.querySelector(`[data-topic="${id}"]`).classList.add('active');

  // Clear search when switching topic
  if (id !== 'all') {
    document.getElementById('search').value = '';
    searchQuery = '';
    document.getElementById('search-clear').classList.remove('visible');
  }

  applyFilters();

  // Scroll to section if specific topic selected
  if (id !== 'all') {
    const block = document.querySelector(`[data-section-block="${id}"]`);
    if (block) setTimeout(() => block.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
  }
}

function applyFilters() {
  let visible = 0;

  allCards.forEach(({ card, section, q }) => {
    const matchesTopic = currentTopic === 'all' || section.id === currentTopic;
    const matchesSearch = !searchQuery || card.dataset.text.includes(searchQuery);
    const show = matchesTopic && matchesSearch;

    card.classList.toggle('hidden', !show);
    if (show) {
      visible++;
      // Update highlights
      const qText = card.querySelector('.q-text');
      const answerText = card.querySelector('.answer-text');
      const explanationText = card.querySelector('.explanation-text');
      const isInline = ['排序','填空','配对','判断'].includes(q.type);

      qText.innerHTML = highlight(q.q, searchQuery) + ` <span class="type-badge">${q.type}</span>`;
      if (isInline) {
        answerText.innerHTML = renderAnswerParts(q.answerParts || [{t: q.answer||''}], searchQuery);
      } else {
        answerText.innerHTML = `<b>${highlight(q.answer||'', searchQuery)}</b>`;
      }
      explanationText.innerHTML = highlight(q.explanation, searchQuery);
    }
  });

  // Show/hide section blocks
  DATA.forEach(section => {
    const block = document.querySelector(`[data-section-block="${section.id}"]`);
    const hasVisible = allCards.some(({card, section: s}) => s.id === section.id && !card.classList.contains('hidden'));
    if (block) block.style.display = hasVisible ? '' : 'none';
  });

  // Banner
  const banner = document.getElementById('results-banner');
  const noResults = document.getElementById('no-results');
  if (searchQuery) {
    banner.innerHTML = `搜索 "<span>${searchQuery}</span>" · 找到 <span>${visible}</span> 题`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
  noResults.classList.toggle('visible', visible === 0);

  // Auto-expand cards when searching
  allCards.forEach(({card}) => {
    if (searchQuery && !card.classList.contains('hidden')) card.classList.add('open');
    else if (!searchQuery) card.classList.remove('open');
  });
}

function expandAll() {
  allCards.forEach(({card}) => { if (!card.classList.contains('hidden')) card.classList.add('open'); });
}

function collapseAll() {
  allCards.forEach(({card}) => card.classList.remove('open'));
}

// Build topic nav
function buildNav() {
  const nav = document.getElementById('topic-nav');
  const all = document.createElement('button');
  all.className = 'topic-pill active';
  all.dataset.topic = 'all';
  all.textContent = '全部';
  all.onclick = () => setTopic('all');
  nav.appendChild(all);

  DATA.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'topic-pill';
    btn.dataset.topic = s.id;
    btn.textContent = s.short;
    btn.onclick = () => setTopic(s.id);
    nav.appendChild(btn);
  });
}

buildNav();
renderAll();
</script>
