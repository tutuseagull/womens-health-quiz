<style>

  

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  

  /* ── SCREENS ── */

  /* ── HOME ── */
  .lang-toggle {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-bottom: 40px;
  }
  .lang-btn {
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .lang-btn.active {
    border-color: var(--text);
    color: var(--text);
    background: var(--text);
    color: var(--bg);
  }

  .home-eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .section-tag {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  /* ── NEW HOME ── */
  .home-section-block { margin-bottom: 16px; }
  .home-section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .quiz-home-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  /* ── QUIZ SCREEN ── */
  #quiz { background: var(--bg); }

  .quiz-header {
    padding: 16px 20px 0;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
  }

  .quiz-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .progress-wrap { margin-top: 10px; }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--btn-primary);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-text { display: none; }

  .section-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .progress-inline {
    font-size: 11px;
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
  }
  .progress-inline-current { color: var(--accent); font-weight: 600; }
  .progress-inline-total { color: var(--text-light); }

  /* ── QUESTION ── */
  .question-wrap {
    padding: 0 20px;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
    flex: 1;
    padding-bottom: 120px;
  }

  .q-difficulty {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 14px;
  }
  .diff-easy { background: #E8F5E9; color: #2E7D32; }
  .diff-medium { background: #FFF3E0; color: #E65100; }
  .diff-hard { background: #FFEBEE; color: #C62828; }

  .q-type-badge {
    display: inline-block;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--neutral-fill);
    padding: 3px 8px;
    border-radius: 6px;
    margin-left: 6px;
    font-weight: 400;
  }
  .q-type-badge.multi { background: #E3F2FD; color: #1565C0; }

  .q-text {
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
    font-size: 22px;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 28px;
  }
  .q-text .highlight-error {
    color: var(--wrong);
    font-style: italic;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

  .option {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: all 0.15s;
    text-align: left;
    width: 100%;
    position: relative;
  }
  .option:active { transform: scale(0.985); }
  .option.selected {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .option.correct {
    border-color: var(--correct);
    background: var(--correct-light);
  }
  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-light);
  }
  .option.dimmed { opacity: 0.45; }
  .option.disabled { pointer-events: none; }

  .option-letter {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .option.selected .option-letter { border-color: var(--accent); color: var(--accent); background: white; }
  .option.correct .option-letter { border-color: var(--correct); color: var(--correct); background: white; }
  .option.wrong .option-letter { border-color: var(--wrong); color: var(--wrong); background: white; }

  .option-text { font-size: 15px; color: var(--text); line-height: 1.5; padding-top: 2px; }

  /* ── TRUE/FALSE ── */
  .tf-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tf-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 12px;
    cursor: pointer;
    text-align: center;
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
    font-size: 22px;
    color: var(--text);
    transition: all 0.15s;
  }
  .tf-btn:active { transform: scale(0.96); }
  .tf-btn.correct { border-color: var(--correct); background: var(--correct-light); color: var(--correct); }
  .tf-btn.wrong { border-color: var(--wrong); background: var(--wrong-light); color: var(--wrong); }
  .tf-btn.dimmed { opacity: 0.4; }
  .tf-btn.disabled { pointer-events: none; }

  /* ── ORDERING ── */
  .order-items { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .order-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.15s;
  }
  .order-item:active { transform: scale(0.985); }
  .order-item.used { opacity: 0.35; pointer-events: none; }
  .order-item.correct-item { border-color: var(--correct); background: var(--correct-light); }
  .order-item.wrong-item { border-color: var(--wrong); background: var(--wrong-light); }

  .order-badge {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .order-item.used .order-badge,
  .order-item.correct-item .order-badge { border-color: var(--correct); color: var(--correct); }
  .order-item.wrong-item .order-badge { border-color: var(--wrong); color: var(--wrong); }

  .inline-blank {
    display: inline-block;
    min-width: 72px;
    height: 32px;
    line-height: 32px;
    border-bottom: 2.5px solid var(--accent);
    padding: 0 6px;
    text-align: center;
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--accent);
    cursor: pointer;
    vertical-align: middle;
    transition: all 0.2s;
    border-radius: 4px 4px 0 0;
    margin: 0 2px;
  }
  .inline-blank.empty { color: var(--text-light); font-weight: 400; font-size: 13px; letter-spacing: 0.04em; }
  .inline-blank.filled { background: var(--accent-light); }
  .inline-blank.correct-blank { border-bottom-color: var(--correct); background: var(--correct-light); color: var(--correct); }
  .inline-blank.wrong-blank { border-bottom-color: var(--wrong); background: var(--wrong-light); color: var(--wrong); }

  /* fill inline blank — mirrors input value in question text */
  .fill-inline-blank {
    display: inline-block;
    min-width: 60px;
    border-bottom: 2px solid var(--accent);
    padding: 0 4px 1px;
    color: var(--accent);
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
    font-size: 18px;
    font-weight: 500;
    vertical-align: baseline;
    transition: min-width 0.15s;
    margin: 0 2px;
  }
  .fill-inline-blank.has-value { background: var(--accent-light); border-radius: 3px 3px 0 0; }
  .fill-inline-blank.correct-fill-inline { border-bottom-color: var(--correct); background: var(--correct-light); color: var(--correct); }
  .fill-inline-blank.wrong-fill-inline { border-bottom-color: var(--wrong); background: var(--wrong-light); color: var(--wrong); }

  /* ── MATCHING ── */
  .match-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .match-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    align-items: stretch;
  }
  .match-left-label {
    background: var(--neutral-fill);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 14px;
    line-height: 1.4;
    color: var(--text);
  }
  .match-right-slot {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 14px;
    line-height: 1.4;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.15s;
    min-height: 48px;
    display: flex; align-items: center;
    background: transparent;
  }
  .match-right-slot.filled {
    border-style: solid;
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--text);
    font-weight: 500;
  }
  .match-right-slot.correct-slot { border-color: var(--correct); background: var(--correct-light); color: var(--correct); }
  .match-right-slot.wrong-slot { border-color: var(--wrong); background: var(--wrong-light); color: var(--wrong); }

  .match-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .match-chip {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
    -webkit-user-select: none; user-select: none;
  }
  .match-chip:active { transform: scale(0.95); }
  .match-chip.used { opacity: 0.3; pointer-events: none; }
  .match-chip.dragging { opacity: 0.5; transform: scale(1.05); }
  .match-row.drag-over .match-right-slot { border-color: var(--accent); background: var(--accent-light); }

  /* ── FILL IN ── */
  .fill-container { margin-bottom: 16px; }
  .fill-text {
    font-size: 16px;
    line-height: 2;
    color: var(--text);
    margin-bottom: 20px;
  }
  .fill-slot {
    display: inline-block;
    min-width: 80px;
    border-bottom: 2px solid var(--accent);
    padding: 0 4px;
    text-align: center;
    font-weight: 500;
    color: var(--accent);
  }
  .fill-inputs { display: flex; flex-direction: column; gap: 12px; }
  .fill-input-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    transition: border-color 0.2s;
  }
  .fill-input-wrap:focus-within { border-color: var(--accent); }
  .fill-input-wrap.correct-fill { border-color: var(--correct); background: var(--correct-light); }
  .fill-input-wrap.wrong-fill { border-color: var(--wrong); background: var(--wrong-light); }
  .fill-input-label { font-size: 12px; color: var(--text-muted); font-weight: 500; flex-shrink: 0; }
  .fill-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
  }
  .fill-input:disabled { color: var(--text-muted); }
  .mic-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .mic-btn.listening { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

  /* ── FEEDBACK ── */
  .feedback-bar {
    position: fixed;
    left: 50%;
    bottom: 0;
    background: var(--surface);
    border-top: 1.5px solid var(--border);
    padding: 16px 20px 24px;
    max-width: 680px;
    width: 100%;
    transform: translateX(-50%) translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
  }
  .feedback-bar.visible {
    transform: translateX(-50%) translateY(0);
  }
  .feedback-bar.correct-bar { border-top-color: var(--correct); }
  .feedback-bar.wrong-bar { border-top-color: var(--wrong); }

  .feedback-result {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .feedback-icon { font-size: 20px; }
  .feedback-label { font-weight: 500; font-size: 15px; }
  .feedback-label.correct-label { color: var(--correct); }
  .feedback-label.wrong-label { color: var(--wrong); }

  .feedback-explanation {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 16px;
    padding: 12px 14px;
    background: var(--neutral-fill);
    border-radius: var(--radius-sm);
  }

  .next-btn {
    width: 100%;
    background: var(--btn-primary);
    color: #fff;
    border: none;
    outline: none;
    border-radius: var(--radius-sm);
    padding: 16px;
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .next-btn:hover { opacity: 0.88; }
  .next-btn:active { transform: scale(0.98); opacity: 0.8; }

  /* ── CONFIRM BTN (multi-select) ── */
  .confirm-bar {
    position: fixed;
    left: 50%; bottom: 0;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 680px;
    padding: 16px 20px 24px;
    background: var(--surface);
    border-top: 1.5px solid var(--border);
    z-index: 99;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .confirm-bar.visible { transform: translateX(-50%) translateY(0); }
  .confirm-btn {
    width: 100%;
    background: var(--btn-primary);
    color: white;
    border: none;
    outline: none;
    border-radius: var(--radius-sm);
    padding: 16px;
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .confirm-btn:disabled { background: rgba(42,56,40,0.15); color: var(--text-muted); cursor: default; opacity: 0.7; }
  .confirm-btn:not(:disabled):active { transform: scale(0.98); }

  /* ── SUBMIT BTN (fill in / ordering / matching) ── */
  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 16px;
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .submit-btn:disabled { background: rgba(42,56,40,0.15); color: var(--text-muted); cursor: default; opacity: 0.7; }
  .submit-btn:not(:disabled):active { transform: scale(0.98); }

  /* ── RESULTS ── */
  #results {
    padding: 48px 24px 40px;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
    align-items: center;
    text-align: center;
  }
  .results-icon { font-size: 56px; margin-bottom: 20px; }
  .results-title {
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
    font-size: 32px;
    margin-bottom: 8px;
  }
  .results-subtitle { font-size: 15px; color: var(--text-muted); margin-bottom: 32px; }
  .score-display {
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
    font-size: 72px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
  }
  .score-label { font-size: 14px; color: var(--text-muted); margin-bottom: 40px; }
  .results-actions { display: flex; flex-direction: column; gap: 12px; width: 100%; }
  .results-btn {
    width: 100%;
    padding: 16px;
    border-radius: var(--radius-sm);
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    outline: none;
    background: var(--btn-secondary);
    color: var(--text);
  }
  .results-btn:hover { background: rgba(255,255,255,0.8); }
  .results-btn.primary { background: var(--btn-primary); color: #fff; border: none; outline: none; }
  .results-btn:active { transform: scale(0.98); }

  /* ── ANIMATION ── */
  .fade-in {
    animation: fadeUp 0.35s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── GLOBAL NAV ── */

  /* Desktop: 3 columns */

    .nav-columns {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;

    }
  }
  @media (max-width: 599px) {
    .nav-columns {
      display: flex;
      flex-direction: column;

    }
  }

  .nav-col-title {
    font-size: 11px;
    font-weight: 600;

    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* push screen content below fixed nav */

// ══ START ══
function startSection(idx) {
  currentSection = SECTIONS[idx];
  currentQ = 0;
  score = 0;
  showScreen('quiz');
  document.getElementById('section-label').textContent = currentSection[lang].title;

  renderQuestion();
}


// ══ QUESTION RENDER ══
function renderQuestion() {
  answered = false;
  selectedOptions = [];
  orderSlots = [];
  matchState = { chips: [], slots: [], selectedChip: null };

  const q = currentSection.questions[currentQ];
  const total = currentSection.questions.length;

  document.getElementById('progress-fill').style.width = ((currentQ / total) * 100) + '%';
  document.getElementById('progress-text').textContent = '';
  const inlineEl = document.getElementById('progress-inline');
  if (inlineEl) {
    if (lang === 'zh') {
      inlineEl.innerHTML = `<span class="progress-inline-current">第 ${currentQ + 1} 题</span><span class="progress-inline-total">，共 ${total} 题</span>`;
    } else {
      inlineEl.innerHTML = `<span class="progress-inline-current">${currentQ + 1}</span><span class="progress-inline-total"> / ${total}</span>`;
    }
  }

  hideFeedback();
  hideConfirm();

  const wrap = document.getElementById('question-wrap');
  wrap.innerHTML = '';
  wrap.classList.remove('fade-in');
  void wrap.offsetWidth;
  wrap.classList.add('fade-in');

  const qd = q[lang];
  const diffMap = { easy: { zh: '简单', en: 'Easy', cls: 'diff-easy' }, medium: { zh: '中等', en: 'Medium', cls: 'diff-medium' }, hard: { zh: '困难', en: 'Hard', cls: 'diff-hard' } };
  const d = diffMap[q.difficulty];
  const typeMap = { single: { zh: '选择题', en: 'Single choice' }, multi: { zh: '多选题', en: 'Multiple choice' }, tf: { zh: '判断题', en: 'True / False' }, order: { zh: '排序题', en: 'Ordering' }, match: { zh: '配对题', en: 'Matching' }, fill: { zh: '填空题', en: 'Fill in' }, finderror: { zh: '找错误项', en: 'Find the error' } };
  const tm = typeMap[q.type] || typeMap.single;

  let html = ``;

  // Question text (skip for 'order' — it renders its own q-text with inline blanks)
  if (q.type !== 'order') {
    let qtext = qd.q;
    if (q.type === 'finderror') {
      if (lang === 'zh') { qtext = qtext.replace('错误', `<span class="highlight-error">错误</span>`); }
      else { qtext = qtext.replace(/\berror\b/i, m => `<span class="highlight-error">${m}</span>`); }
    }
    html += `<div class="q-text">${qtext}</div>`;
  }

  // Body by type
  if (q.type === 'single' || q.type === 'finderror') {
    html += `<div class="options">` + qd.options.map((opt, i) => `
      <button class="option" onclick="selectSingle(${i})">
        <span class="option-letter">${String.fromCharCode(65+i)}</span>
        <span class="option-text">${opt}</span>
      </button>`).join('') + `</div>`;

  } else if (q.type === 'multi') {
    html += `<div class="options" id="multi-options">` + qd.options.map((opt, i) => `
      <button class="option" onclick="toggleMulti(${i})">
        <span class="option-letter">${String.fromCharCode(65+i)}</span>
        <span class="option-text">${opt}</span>
      </button>`).join('') + `</div>`;

  } else if (q.type === 'tf') {
    html += `<div class="tf-options">
      <button class="tf-btn" onclick="selectTF(true)">${lang === 'zh' ? '✓ 对' : '✓ True'}</button>
      <button class="tf-btn" onclick="selectTF(false)">${lang === 'zh' ? '✗ 错' : '✗ False'}</button>
    </div>`;

  } else if (q.type === 'order') {
    // Build question text with inline blanks replacing ___ tokens
    const emptyLabel = lang === 'zh' ? '点击填入' : 'tap to fill';
    let blankIdx2 = 0;
    const qtextOrder = qd.q.replace(/___/g, () => {
      const idx = blankIdx2++;
      return `<span class="inline-blank empty" id="blank-${idx}" onclick="unselectSlot(${idx})">${emptyLabel}</span>`;
    });
    // Inject dynamic q-text with inline blanks (skip static q-text rendering for order type)
    html += `<div class="q-text" style="line-height:1.9;font-size:20px">${qtextOrder}</div>`;
    html += `<div class="order-items">` + qd.items.map((item, i) => `
      <button class="order-item" id="order-item-${i}" onclick="selectOrder('${item.charAt(0)}', ${i}, '${item.slice(3).replace(/'/g,"\\'")}')">
        <span class="order-badge">${item.charAt(0)}</span>
        <span style="font-size:15px">${item.slice(3)}</span>
      </button>`).join('') + `</div>`;
    html += `<button class="submit-btn" id="order-submit" disabled onclick="submitOrder()">${lang === 'zh' ? '提交答案' : 'Submit'}</button>`;

  } else if (q.type === 'match') {
    // Shuffle chips
    const chips = q[lang].rights.map((r, i) => ({ text: r, origIdx: i }));
    for (let i = chips.length - 1; i > 0; i--) {
      const j = (i * 7 + 3) % (i + 1);
      [chips[i], chips[j]] = [chips[j], chips[i]];
    }
    matchState.chips = chips;
    matchState.slots = new Array(q[lang].lefts.length).fill(null); // slot[i] = origIdx of chip placed, or null
    matchState.selectedChip = null;
    // Rows: left label + empty right slot
    html += `<div class="match-rows" id="match-rows">`;
    q[lang].lefts.forEach((left, i) => {
      html += `<div class="match-row" id="match-row-${i}" ondragover="matchDragOver(event,${i})" ondrop="matchDrop(event,${i})" ondragleave="matchDragLeave(event,${i})">
        <div class="match-left-label">${left}</div>
        <div class="match-right-slot" id="mslot-${i}" onclick="matchSlotClick(${i})">${lang === 'zh' ? '点击填入…' : 'tap to fill…'}</div>
      </div>`;
    });
    html += `</div>`;
    // Chips at bottom
    html += `<div class="match-chips" id="match-chips">`;
    chips.forEach((chip, ci) => {
      html += `<div class="match-chip" id="mchip-${ci}" draggable="true"
        onclick="matchChipClick(${ci})"
        ondragstart="matchDragStart(event,${ci})"
        ondragend="matchDragEnd(event)">${chip.text}</div>`;
    });
    html += `</div>`;
    html += `<button class="submit-btn" id="match-submit" disabled onclick="submitMatch()">${lang === 'zh' ? '提交答案' : 'Submit'}</button>`;

  } else if (q.type === 'fill') {
    // Build inline blanks in question text
    let fillBlankIdx = 0;
    const qtextFill = qd.q.replace(/___/g, () => {
      const idx = fillBlankIdx++;
      return `<span class="fill-inline-blank" id="fill-blank-${idx}">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>`;
    });
    html = html.replace(`<div class="q-text">${qd.q}</div>`, `<div class="q-text" style="line-height:1.9">${qtextFill}</div>`);
    html += `<div class="fill-inputs" id="fill-inputs">` + qd.blanks.map((label, i) => `
      <div class="fill-input-wrap" id="fill-wrap-${i}">
        <span class="fill-input-label">${label}</span>
        <input class="fill-input" id="fill-input-${i}" type="text" placeholder="${lang === 'zh' ? '输入答案…' : 'Type your answer…'}" oninput="onFillInput(${i})">
        <button class="mic-btn" id="mic-btn-${i}" onclick="toggleMic(${i})" title="${lang === 'zh' ? '语音输入' : 'Voice input'}">🎤</button>
      </div>`).join('') + `</div>`;
    html += `<button class="submit-btn" id="fill-submit" disabled onclick="submitFill()">${lang === 'zh' ? '提交答案' : 'Submit'}</button>`;
  }

  wrap.innerHTML = html;

  // Show confirm bar for multi
  if (q.type === 'multi') showConfirm();
}

// ══ INTERACTIONS ══
function selectSingle(i) {
  if (answered) return;
  answered = true;
  const q = currentSection.questions[currentQ];
  const correct = i === q.answer;
  if (correct) score++;
  const opts = document.querySelectorAll('.option');
  opts.forEach((o, idx) => {
    o.classList.add('disabled');
    if (idx === q.answer) o.classList.add('correct');
    else if (idx === i && !correct) o.classList.add('wrong');
    else o.classList.add('dimmed');
  });
  const correctAns = correct ? null : q[lang].options[q.answer];
  showFeedback(correct, q[lang].explanation, correctAns);
}

function selectTF(val) {
  if (answered) return;
  answered = true;
  const q = currentSection.questions[currentQ];
  const correct = val === q.answer;
  if (correct) score++;
  const btns = document.querySelectorAll('.tf-btn');
  btns.forEach(b => {
    b.classList.add('disabled');
    const isTrue = b.textContent.includes('✓');
    if (isTrue === q.answer) b.classList.add('correct');
    else if (isTrue === val && !correct) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });
  const correctAns = correct ? null : (q.answer ? (lang === 'zh' ? '对' : 'True') : (lang === 'zh' ? '错' : 'False'));
  showFeedback(correct, q[lang].explanation, correctAns);
}

function toggleMulti(i) {
  if (answered) return;
  const opts = document.querySelectorAll('.option');
  const idx = selectedOptions.indexOf(i);
  if (idx > -1) { selectedOptions.splice(idx, 1); opts[i].classList.remove('selected'); }
  else { selectedOptions.push(i); opts[i].classList.add('selected'); }
  document.getElementById('confirm-btn').disabled = selectedOptions.length === 0;
}

function submitMulti() {
  if (answered) return;
  answered = true;
  hideConfirm();
  const q = currentSection.questions[currentQ];
  const correctSet = new Set(q.answer);
  const selectedSet = new Set(selectedOptions);
  const allCorrect = correctSet.size === selectedSet.size && [...correctSet].every(x => selectedSet.has(x));
  if (allCorrect) score++;
  const opts = document.querySelectorAll('.option');
  opts.forEach((o, i) => {
    o.classList.add('disabled');
    if (correctSet.has(i)) o.classList.add('correct');
    else if (selectedSet.has(i)) o.classList.add('wrong');
    else o.classList.add('dimmed');
  });
  const correctAns = allCorrect ? null : q[lang].options.filter((_,i) => correctSet.has(i)).join(' / ');
  showFeedback(allCorrect, q[lang].explanation, correctAns);
}

function selectOrder(letter, itemIdx, label) {
  if (answered) return;
  const nextSlot = orderSlots.length;
  const totalBlanks = currentSection.questions[currentQ][lang].q.split('___').length - 1;
  if (nextSlot >= totalBlanks) return;
  orderSlots.push(letter);
  const blank = document.getElementById(`blank-${nextSlot}`);
  blank.textContent = label || letter;
  blank.classList.remove('empty');
  blank.classList.add('filled');
  document.getElementById(`order-item-${itemIdx}`).classList.add('used');
  if (orderSlots.length === totalBlanks) document.getElementById('order-submit').disabled = false;
}

function unselectSlot(slotIdx) {
  if (answered || orderSlots.length <= slotIdx) return;
  const removed = orderSlots[slotIdx];
  const removedItems = orderSlots.splice(slotIdx);
  // re-enable all items from slotIdx onward
  const q = currentSection.questions[currentQ];
  const totalBlanks = q[lang].q.split('___').length - 1;
  // Re-enable items whose letters are in removedItems
  document.querySelectorAll('.order-item').forEach((el) => {
    const letter = el.querySelector('.order-badge').textContent;
    if (removedItems.includes(letter)) el.classList.remove('used');
  });
  // Reset blanks from slotIdx onward
  const emptyLabel = lang === 'zh' ? '点击填入' : 'tap to fill';
  for (let i = slotIdx; i < totalBlanks; i++) {
    const blank = document.getElementById(`blank-${i}`);
    if (blank) {
      blank.textContent = emptyLabel;
      blank.classList.remove('filled');
      blank.classList.add('empty');
    }
  }
  document.getElementById('order-submit').disabled = true;
}

function submitOrder() {
  if (answered) return;
  answered = true;
  const q = currentSection.questions[currentQ];
  const correct = JSON.stringify(orderSlots) === JSON.stringify(q.answer);
  if (correct) score++;
  const totalBlanks = q[lang].q.split('___').length - 1;
  orderSlots.forEach((letter, i) => {
    const blank = document.getElementById(`blank-${i}`);
    if (blank) {
      blank.classList.remove('filled', 'empty');
      blank.classList.add(letter === q.answer[i] ? 'correct-blank' : 'wrong-blank');
    }
  });
  document.querySelectorAll('.order-item').forEach(el => {
    const letter = el.querySelector('.order-badge').textContent;
    el.classList.add(q.answer.includes(letter) ? 'correct-item' : 'wrong-item');
  });
  document.getElementById('order-submit').disabled = true;
  showFeedback(correct, q[lang].explanation);
}

function onFillInput(idx) {
  // Mirror value into inline blank
  const input = document.getElementById(`fill-input-${idx}`);
  const blank = document.getElementById(`fill-blank-${idx}`);
  if (blank) {
    const val = input.value;
    blank.textContent = val || '        ';
    blank.classList.toggle('has-value', val.length > 0);
  }
  checkFillReady();
}

function checkFillReady() {
  const q = currentSection.questions[currentQ];
  const allFilled = q[lang].blanks.every((_, i) => document.getElementById(`fill-input-${i}`)?.value.trim().length > 0);
  const btn = document.getElementById('fill-submit');
  if (btn) btn.disabled = !allFilled;
}

function submitFill() {
  if (answered) return;
  answered = true;
  const q = currentSection.questions[currentQ];
  let allCorrect = true;
  const correctAnswerDisplay = [];
  q.answer.forEach((ans, i) => {
    const userVal = document.getElementById(`fill-input-${i}`)?.value.trim().toLowerCase() || '';
    // Keyword matching: split by / and also strip spaces for comparison
    const keywords = ans.toLowerCase().split('/').map(k => k.trim().replace(/\s/g,''));
    const isCorrect = keywords.some(kw => kw.length > 0 && userVal.replace(/\s/g,'').includes(kw));
    const wrap = document.getElementById(`fill-wrap-${i}`);
    const input = document.getElementById(`fill-input-${i}`);
    const blank = document.getElementById(`fill-blank-${i}`);
    input.disabled = true;
    stopMic();
    if (isCorrect) {
      wrap.classList.add('correct-fill');
      if (blank) { blank.classList.remove('has-value'); blank.classList.add('correct-fill-inline'); }
    } else {
      wrap.classList.add('wrong-fill');
      if (blank) { blank.classList.remove('has-value'); blank.classList.add('wrong-fill-inline'); }
      allCorrect = false;
      // Show first keyword as the display answer (skip English alternates after /)
      const displayAns = ans.split('/')[0].trim();
      correctAnswerDisplay.push(displayAns);
    }
  });
  if (allCorrect) score++;
  document.getElementById('fill-submit').disabled = true;
  const correctAnswerStr = correctAnswerDisplay.length > 0 ? correctAnswerDisplay.join('  /  ') : null;
  showFeedback(allCorrect, q[lang].explanation, correctAnswerStr);
}

// ── MATCH ──
let matchDraggingChip = null;

function matchPlaceChip(slotIdx, chipIdx) {
  // Remove chip from any existing slot
  const existingSlot = matchState.slots.indexOf(matchState.chips[chipIdx].origIdx);
  // Remove whatever is in target slot — return it to chips
  if (matchState.slots[slotIdx] !== null) {
    const displaced = matchState.slots[slotIdx];
    const displacedChipIdx = matchState.chips.findIndex(c => c.origIdx === displaced);
    if (displacedChipIdx !== -1) document.getElementById(`mchip-${displacedChipIdx}`).classList.remove('used');
  }
  // Remove chip from previous slot if any
  matchState.slots.forEach((s, si) => {
    if (s === matchState.chips[chipIdx].origIdx) matchState.slots[si] = null;
  });
  matchState.slots[slotIdx] = matchState.chips[chipIdx].origIdx;
  // Update slot UI
  const slot = document.getElementById(`mslot-${slotIdx}`);
  slot.textContent = matchState.chips[chipIdx].text;
  slot.classList.add('filled');
  // Mark chip used
  document.getElementById(`mchip-${chipIdx}`).classList.add('used');
  matchState.selectedChip = null;
  // Deselect all chips
  document.querySelectorAll('.match-chip').forEach(c => c.style.outline = '');
  checkMatchReady();
}

function matchChipClick(chipIdx) {
  if (answered) return;
  if (matchState.chips[chipIdx] && document.getElementById(`mchip-${chipIdx}`).classList.contains('used')) return;
  // Deselect if same chip
  if (matchState.selectedChip === chipIdx) {
    matchState.selectedChip = null;
    document.getElementById(`mchip-${chipIdx}`).style.outline = '';
    return;
  }
  // Deselect previous
  if (matchState.selectedChip !== null) document.getElementById(`mchip-${matchState.selectedChip}`).style.outline = '';
  matchState.selectedChip = chipIdx;
  document.getElementById(`mchip-${chipIdx}`).style.outline = `2px solid var(--accent)`;
}

function matchSlotClick(slotIdx) {
  if (answered) return;
  if (matchState.selectedChip !== null) {
    matchPlaceChip(slotIdx, matchState.selectedChip);
  } else if (matchState.slots[slotIdx] !== null) {
    // Click filled slot to remove
    const origIdx = matchState.slots[slotIdx];
    const chipIdx = matchState.chips.findIndex(c => c.origIdx === origIdx);
    matchState.slots[slotIdx] = null;
    const slot = document.getElementById(`mslot-${slotIdx}`);
    slot.textContent = lang === 'zh' ? '点击填入…' : 'tap to fill…';
    slot.classList.remove('filled');
    if (chipIdx !== -1) document.getElementById(`mchip-${chipIdx}`).classList.remove('used');
    checkMatchReady();
  }
}

// Drag support
function matchDragStart(event, chipIdx) {
  matchDraggingChip = chipIdx;
  event.dataTransfer.effectAllowed = 'move';
  document.getElementById(`mchip-${chipIdx}`).classList.add('dragging');
}
function matchDragEnd(event) {
  if (matchDraggingChip !== null) document.getElementById(`mchip-${matchDraggingChip}`)?.classList.remove('dragging');
  matchDraggingChip = null;
  document.querySelectorAll('.match-row').forEach(r => r.classList.remove('drag-over'));
}
function matchDragOver(event, slotIdx) {
  event.preventDefault();
  document.getElementById(`match-row-${slotIdx}`).classList.add('drag-over');
}
function matchDragLeave(event, slotIdx) {
  document.getElementById(`match-row-${slotIdx}`).classList.remove('drag-over');
}
function matchDrop(event, slotIdx) {
  event.preventDefault();
  document.getElementById(`match-row-${slotIdx}`).classList.remove('drag-over');
  if (matchDraggingChip !== null) matchPlaceChip(slotIdx, matchDraggingChip);
  matchDraggingChip = null;
}

function checkMatchReady() {
  const allPaired = matchState.slots.every(s => s !== null);
  const btn = document.getElementById('match-submit');
  if (btn) btn.disabled = !allPaired;
}

function submitMatch() {
  if (answered) return;
  answered = true;
  const q = currentSection.questions[currentQ];
  let allCorrect = true;
  matchState.slots.forEach((origIdx, slotIdx) => {
    const isCorrect = origIdx === q.answer[slotIdx];
    const slot = document.getElementById(`mslot-${slotIdx}`);
    slot.classList.remove('filled');
    slot.classList.add(isCorrect ? 'correct-slot' : 'wrong-slot');
    if (!isCorrect) allCorrect = false;
  });
  if (allCorrect) score++;
  document.getElementById('match-submit').disabled = true;
  const correctAns = allCorrect ? null : q[lang].lefts.map((l, i) => `${l} → ${q[lang].rights[q.answer[i]]}`).join(' / ');
  showFeedback(allCorrect, q[lang].explanation, correctAns);
}

// ── VOICE INPUT ──
function toggleMic(idx) {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert(lang === 'zh' ? '您的浏览器不支持语音输入，请手动输入。' : 'Your browser does not support speech recognition.');
    return;
  }
  if (listeningIndex === idx) { stopMic(); return; }
  stopMic();
  listeningIndex = idx;
  document.getElementById(`mic-btn-${idx}`).classList.add('listening');
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = lang === 'zh' ? 'zh-CN' : 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = (e) => {
    document.getElementById(`fill-input-${idx}`).value = e.results[0][0].transcript;
    checkFillReady();
    stopMic();
  };
  recognition.onerror = () => stopMic();
  recognition.onend = () => stopMic();
  recognition.start();
}

function stopMic() {
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  if (listeningIndex >= 0) {
    const btn = document.getElementById(`mic-btn-${listeningIndex}`);
    if (btn) btn.classList.remove('listening');
    listeningIndex = -1;
  }
}

// ── FEEDBACK ──
function showFeedback(correct, explanation, correctAnswer) {
  const bar = document.getElementById('feedback-bar');
  bar.className = 'feedback-bar ' + (correct ? 'correct-bar' : 'wrong-bar');
  document.getElementById('feedback-icon').textContent = correct ? '✓' : '✗';
  document.getElementById('feedback-label').className = 'feedback-label ' + (correct ? 'correct-label' : 'wrong-label');
  document.getElementById('feedback-label').textContent = correct
    ? (lang === 'zh' ? '答对了！' : 'Correct!')
    : (lang === 'zh' ? '答错了' : 'Not quite');
  // Show correct answer if wrong and provided
  const correctEl = document.getElementById('feedback-correct');
  if (!correct && correctAnswer) {
    correctEl.textContent = (lang === 'zh' ? '正确答案：' : 'Correct answer: ') + correctAnswer;
    correctEl.style.display = 'block';
  } else {
    correctEl.style.display = 'none';
  }
  document.getElementById('feedback-explanation').textContent = explanation;
  // Self-mark button for fill questions
  const selfBtn = document.getElementById('self-mark-btn');
  const q = currentSection.questions[currentQ];
  if (!correct && q.type === 'fill') {
    selfBtn.textContent = lang === 'zh' ? '✓ 我的答案也正确' : '✓ My answer was correct';
    selfBtn.style.display = 'block';
  } else {
    selfBtn.style.display = 'none';
  }
  const isLast = currentQ === currentSection.questions.length - 1;
  document.getElementById('next-btn').textContent = isLast
    ? (lang === 'zh' ? '查看结果 →' : 'See results →')
    : (lang === 'zh' ? '下一题 →' : 'Next →');
  setTimeout(() => bar.classList.add('visible'), 50);
}

function selfMark() {
  score++;
  document.getElementById('self-mark-btn').style.display = 'none';
  document.getElementById('feedback-bar').className = 'feedback-bar correct-bar';
  document.getElementById('feedback-icon').textContent = '✓';
  document.getElementById('feedback-label').className = 'feedback-label correct-label';
  document.getElementById('feedback-label').textContent = lang === 'zh' ? '答对了！' : 'Correct!';
  document.getElementById('feedback-correct').style.display = 'none';
}

function hideFeedback() {
  const bar = document.getElementById('feedback-bar');
  bar.classList.remove('visible');
}

function showConfirm() {
  const bar = document.getElementById('confirm-bar');
  const btn = document.getElementById('confirm-btn');
  btn.textContent = lang === 'zh' ? '确认答案' : 'Confirm answer';
  setTimeout(() => bar.classList.add('visible'), 50);
}

function hideConfirm() {
  document.getElementById('confirm-bar').classList.remove('visible');
}

// ── NEXT ──
function nextQuestion() {
  hideFeedback();
  currentQ++;
  if (currentQ >= currentSection.questions.length) {
    showResults();
  } else {
    setTimeout(renderQuestion, 300);
  }
}

// ── RESULTS ──
function showResults() {
  showScreen('results');
  const total = currentSection.questions.length;
  const pct = Math.round((score / total) * 100);
  const icons = pct >= 80 ? '🌸' : pct >= 50 ? '💪' : '📚';
  document.getElementById('results-icon').textContent = icons;
  document.getElementById('results-title').textContent = lang === 'zh'
    ? (pct >= 80 ? '太厉害了！' : pct >= 50 ? '答得不错！' : '继续加油！')
    : (pct >= 80 ? 'Brilliant!' : pct >= 50 ? 'Well done!' : 'Keep learning!');
  document.getElementById('results-subtitle').textContent = lang === 'zh'
    ? currentSection.zh.title
    : currentSection.en.title;
  document.getElementById('score-display').textContent = score + '/' + total;
  document.getElementById('score-label').textContent = lang === 'zh'
    ? `答对 ${score} 题，正确率 ${pct}%`
    : `${score} correct · ${pct}% accuracy`;
  document.getElementById('retry-btn').textContent = lang === 'zh' ? '再来一次' : 'Try again';
  document.getElementById('home-btn').textContent = lang === 'zh' ? '换个主题试试' : 'Try another topic';

}

function retrySection() {
  const idx = SECTIONS.indexOf(currentSection);
  startSection(idx);
}

function goHome() {
  showScreen('quiz-home');
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── INIT ──
showScreen('quiz-home');
renderHome();

function openNav() {
  document.getElementById('nav-drawer').classList.add('open');
  document.getElementById('nav-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeNav() {
  document.getElementById('nav-drawer').classList.remove('open');
  document.getElementById('nav-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function navTo(screen) {
  closeNav();
  showScreen(screen);
}
function updateNavLang() {
  document.getElementById('nav-lang-zh').classList.toggle('active', lang === 'zh');
  document.getElementById('nav-lang-en').classList.toggle('active', lang === 'en');
}
</script>
